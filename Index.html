<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="Style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie App</title>
</head>

<body>
    <header class="header-container">
        <div class="logo">
            <div class="logoL">🎥</div>
            <div class="logoT">JJ <span class="logoT2">Filmers</span></div>
        </div>
        <nav class="nav-container">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Movies</a></li>
                <li><a href="#">TV Shows</a></li>
                <li><a href="#">My List</a></li>
            </ul>
        </nav>
    </header>

    <div class="search-container">
        <input type="text" class="search-box" placeholder="Search for movies, TV shows...">
        <button class="search-icon">🔍</button>
    </div>

    <main>
        <section class="featured-section">
            <div class="featured-movie">
                <img src="" alt="featured-movie" class="featured-backdrop">
                <div class="featured-overlay">
                    <h2 class="featured-title">Featured Movie Title</h2>
                    <p class="featured-description"></p>
                    <div class="featured actions">
                        <button class="play-button">▶ Play</button>
                        <button class="info-button">ℹ Info</button>
                    </div>

                </div>

            </div>
        </section>
    </main>





</body>
<script src="Script.js"></script>

</html>
